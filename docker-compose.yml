services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aru}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aru_secret}
      POSTGRES_DB: ${POSTGRES_DB:-aru_crm}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-aru} -d ${POSTGRES_DB:-aru_crm}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aru}:${POSTGRES_PASSWORD:-aru_secret}@postgres:5432/${POSTGRES_DB:-aru_crm}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
    env_file:
      - .env
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      # Mount source code for hot reload (read-write so NestJS can write to dist)
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.build.json:/app/tsconfig.build.json
      - ./nest-cli.json:/app/nest-cli.json
      # Exclude node_modules from volume mount (use container's)
      - /app/node_modules

volumes:
  postgres_data:
